<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mediquick Chat</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* General Styles */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #f0f0f0;
    }

    /* Chat Container */
    .chat-container {
      width: 100%;
      height: 100vh;
      background-color: #fff;
      display: flex;
      flex-direction: column;
    }

    /* Chat Header */
    .chat-header {
      display: flex;
      align-items: center;
      padding: 10px;
      background-color: #007bff;
      color: #fff;
    }

    .profile-pic {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      margin-right: 10px;
    }

    .doctor-info h2 {
      margin: 0;
      font-size: 18px;
    }

    .doctor-info p {
      margin: 0;
      font-size: 14px;
      color: #e0e0e0;
    }

    /* Chat History */
    .chat-history {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      background-color: #f9f9f9;
    }

    .message {
      margin-bottom: 10px;
      max-width: 70%;
      padding: 10px;
      border-radius: 10px;
    }

    .message.received {
      background-color: #e0e0e0;
      align-self: flex-start;
    }

    .message.sent {
      background-color: #007bff;
      color: #fff;
      align-self: flex-end;
      margin-left: auto;
    }

    /* Chat Input */
    .chat-input {
      display: flex;
      align-items: center;
      padding: 10px;
      background-color: #fff;
      border-top: 1px solid #ddd;
    }

    .chat-input input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 20px;
      margin-right: 10px;
    }

    .chat-input button {
      padding: 10px 20px;
      border: none;
      border-radius: 20px;
      background-color: #007bff;
      color: #fff;
      cursor: pointer;
    }

    .chat-input button:hover {
      background-color: #0056b3;
    }

    .file-upload-label {
      cursor: pointer;
      margin-left: 10px;
    }

    .file-upload-label input {
      display: none;
    }
  </style>

</head>

<body>
  <!-- Chat Container -->
  <div class="chat-container">
    <!-- Chat Header -->
    <div class="chat-header">
      <img src="doctor-profile.jpg" alt="Doctor Profile" class="profile-pic">
      <div class="doctor-info">
        <h2>Dr. John Doe</h2>
        <p>Online</p>
      </div>
    </div>

    <!-- Chat History -->
    <div class="chat-history" id="chat-history">
      <!-- Example Messages -->
      <div class="message received">
        <p>Hello! How can I assist you today?</p>
      </div>
      <div class="message sent">
        <p>Hi Doctor, I need help with my prescription.</p>
      </div>
    </div>

      </label>
    </div>
  </div>

  <script>
    // Function to send a message
    function sendMessage() {
      const input = document.getElementById("message-input");
      const message = input.value.trim();

      if (message) {
        const chatHistory = document.getElementById("chat-history");
        const messageElement = document.createElement("div");
        messageElement.classList.add("message", "sent");
        messageElement.innerHTML = `<p>${message}</p>`;
        chatHistory.appendChild(messageElement);

        // Clear input
        input.value = "";

        // Scroll to bottom
        chatHistory.scrollTop = chatHistory.scrollHeight;
      }
    }

    // Function to handle file upload
    function handleFileUpload(event) {
      const file = event.target.files[0];
      if (file) {
        const chatHistory = document.getElementById("chat-history");
        const messageElement = document.createElement("div");
        messageElement.classList.add("message", "sent");

        if (file.type.startsWith("image/")) {
          // Display image
          const reader = new FileReader();
          reader.onload = (e) => {
            messageElement.innerHTML = `<img src="${e.target.result}" alt="Uploaded Image" style="max-width: 100%; border-radius: 10px;">`;
            chatHistory.appendChild(messageElement);
          };
          reader.readAsDataURL(file);
        } else {
          // Display file name
          messageElement.innerHTML = `<p>File: ${file.name}</p>`;
          chatHistory.appendChild(messageElement);
        }

        // Scroll to bottom
        chatHistory.scrollTop = chatHistory.scrollHeight;
      }
    }

    // Allow pressing Enter to send a message
    document.getElementById("message-input").addEventListener("keypress", (e) => {
      if (e.key === "Enter") {
        sendMessage();
      }
    });
  </script>
</body>

</html>
